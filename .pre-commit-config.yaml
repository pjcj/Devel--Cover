---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

fail_fast: false  # Allow all checks to run even if one fails

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [ --maxkb=600 ]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-shebang-scripts-are-executable
        # Test files have shebangs by convention but the harness runs them
        exclude: \.t$
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: ^test_output/
      - id: fix-byte-order-marker
      - id: forbid-new-submodules
      - id: mixed-line-ending
        args: [ --fix=lf ]
        exclude: ^test_output/
      - id: pretty-format-json
        args: [ --autofix ]
      - id: trailing-whitespace
        exclude: ^test_output/

  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: forbid-binary
        exclude: |
          (?x)(
            \.png$  |
            \.ico$
          )
      - id: git-check    # configure in .gitattributes
      # The autoenv plugin requires this exact filename, and shellcheck
      # cannot parse zsh.
      - id: script-must-have-extension
        exclude: \.autoenv\.zsh$
      - id: script-must-not-have-extension
      # Shell/bash scripts, detected by type and shebang.
      - id: shellcheck
        args: [ -a ]
        exclude: \.autoenv\.zsh$
      - id: shfmt
        args: [ -w, -i, "2", -s, -d ]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint

  - repo: https://github.com/crate-ci/typos
    rev: v1.48.0
    hooks:
      - id: typos
        args: [ --force-exclude ]

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: [ --number ]
        additional_dependencies:
          - mdformat-gfm
          - mdformat-frontmatter
          - mdformat-wikilink

  - repo: local
    hooks:
      # perl-hook selects Perl files itself, by extension or shebang, so
      # coverage doesn't depend on paths or the executable bit.
      - id: perltidy-check
        name: perltidy (check only)
        description: Check Perl files are formatted with perltidy
        language: system
        entry: utils/perl-hook tidy
        types: [ text ]
        # Fixture formatting is deliberate and embedded in the golden files;
        # 00-report-prereqs.t is generated by Dist::Zilla
        exclude: |
          (?x)^(
            tests/ |
            t/00-report-prereqs\.t$
          )

      - id: perlcritic
        name: perlcritic
        description: Check Perl files with perlcritic
        language: system
        entry: utils/perl-hook critic
        types: [ text ]
        # Fixtures deliberately use constructs perlcritic would reject;
        # 00-report-prereqs.t is generated by Dist::Zilla; Truth_Table.pm
        # is legacy code being replaced by Condition_table
        exclude: |
          (?x)^(
            tests/ |
            t/00-report-prereqs\.t$ |
            lib/Devel/Cover/Truth_Table\.pm$
          )

      - id: jscpd
        name: Check for duplicated code
        description: Ensure we don't have large sections of duplicated code
        language: node
        entry: jscpd
        pass_filenames: false
        additional_dependencies:
          - jscpd@5.0.11
